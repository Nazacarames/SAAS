# Stage B - Reads to FastAPI (promotion from canary)

upstream node_api { server 127.0.0.1:4000; }
upstream fastapi_api { server 127.0.0.1:4010; }

server {
  server_name login.charlott.ai;
  root /var/www/atendechat;
  index index.html;

  # Webhook stays on Node
  location = /api/whatsapp-cloud/webhook {
    proxy_pass http://node_api/api/whatsapp-cloud/webhook;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  # Auth routes - FastAPI (promoted from canary)
  location ~ ^/api/auth/me$ { proxy_pass http://fastapi_api; include /etc/nginx/snippets/proxy-common.conf; }
  location ~ ^/api/auth/(login|refresh|logout)$ { proxy_pass http://fastapi_api; include /etc/nginx/snippets/proxy-common.conf; }
  location ~ ^/api/users/? { proxy_pass http://fastapi_api; include /etc/nginx/snippets/proxy-common.conf; }

  # Stage B: Read routes -> FastAPI
  location ~ ^/api/(contacts|conversations)(/.*)?$ { proxy_pass http://fastapi_api; include /etc/nginx/snippets/proxy-common.conf; }
  location ~ ^/api/messages/\d+$ { proxy_pass http://fastapi_api; include /etc/nginx/snippets/proxy-common.conf; }

  # Write routes remain on Node until Stage C
  location = /api/contacts { proxy_pass http://node_api; include /etc/nginx/snippets/proxy-common.conf; }
  location ~ ^/api/contacts/\d+$ { proxy_pass http://node_api; include /etc/nginx/snippets/proxy-common.conf; }
  location = /api/messages { proxy_pass http://node_api; include /etc/nginx/snippets/proxy-common.conf; }

  # Socket stays on Node
  location /socket.io/ { proxy_pass http://node_api/socket.io/; include /etc/nginx/snippets/proxy-common.conf; }

  # Frontend
  location / { try_files $uri /index.html; }

  listen 443 ssl;
  ssl_certificate /etc/letsencrypt/live/login.charlott.ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/login.charlott.ai/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server { if ($host = login.charlott.ai) { return 301 https://$host$request_uri; } server_name login.charlott.ai; listen 80; return 404; }
