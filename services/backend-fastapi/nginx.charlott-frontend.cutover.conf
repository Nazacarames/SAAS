# Target file: /etc/nginx/sites-enabled/charlott-frontend
# Purpose: gradual /api cutover from Node (4000) to FastAPI (4010)

upstream node_api {
  server 127.0.0.1:4000;
}

upstream fastapi_api {
  server 127.0.0.1:4010;
}

map $http_x_api_canary $use_fastapi_canary {
  default 0;
  "1" 1;
}

server {
  server_name login.charlott.ai;
  root /var/www/atendechat;
  index index.html;

  # Keep existing webhook pinned to Node until parity tests pass
  location = /api/whatsapp-cloud/webhook {
    proxy_pass http://node_api/api/whatsapp-cloud/webhook;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  # Stage 1 canary: auth/me + users
  location = /api/auth/me {
    if ($use_fastapi_canary = 1) { proxy_pass http://fastapi_api; break; }
    proxy_pass http://node_api;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  location ~ ^/api/users/? {
    if ($use_fastapi_canary = 1) { proxy_pass http://fastapi_api; break; }
    proxy_pass http://node_api;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  # Stage 2 reads -> FastAPI
  location ~ ^/api/(contacts|conversations)(/.*)?$ {
    proxy_pass http://fastapi_api;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  location ~ ^/api/messages/\d+$ {
    proxy_pass http://fastapi_api;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  # Stage 3 writes -> FastAPI
  location = /api/messages {
    proxy_pass http://fastapi_api;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  # Existing socket path stays in Node for now
  location /socket.io/ {
    proxy_pass http://node_api/socket.io/;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  # Fallback: all other /api routes still in Node
  location /api {
    proxy_pass http://node_api;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  # Frontend
  location / {
    try_files $uri /index.html;
  }

  listen 443 ssl;
  ssl_certificate /etc/letsencrypt/live/login.charlott.ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/login.charlott.ai/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
  if ($host = login.charlott.ai) { return 301 https://$host$request_uri; }
  server_name login.charlott.ai;
  listen 80;
  return 404;
}
