name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to VPS
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key
          scp -i /tmp/vps_key -o StrictHostKeyChecking=no -r $GITHUB_WORKSPACE/services/backend-fastapi/app/* root@${{ secrets.VPS_HOST }}:/opt/backend-fastapi/app/
          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} "systemctl restart charlott-fastapi"
